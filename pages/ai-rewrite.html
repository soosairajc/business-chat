<!DOCTYPE html>
<html lang="en" class="h-full dark" dir="ltr" data-ai-active="rewrite">
<head>
  <script>(function(){try{var r=document.documentElement,t=localStorage.getItem("nexus-theme");r.classList.toggle("dark",t?t==="dark":!matchMedia("(prefers-color-scheme: light)").matches);var s=JSON.parse(localStorage.getItem("nexus-settings")||"{}");if(s.accent)r.setAttribute("data-accent",s.accent);if(s.fontSize)r.style.fontSize=s.fontSize+"px";if(s.density)r.setAttribute("data-density",s.density);if(s.sidebar)r.setAttribute("data-sidebar",s.sidebar);if(s.layout)r.setAttribute("data-layout",s.layout);if(s.reduceMotion)r.setAttribute("data-reduce-motion","true");}catch(e){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Rewrite — Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="h-full bg-slate-950 text-slate-100 font-sans overflow-hidden">
<div class="flex h-full overflow-hidden">

  <!-- Icon Rail -->
  <nav aria-label="Workspace navigation" class="flex flex-col items-center w-14 shrink-0 bg-slate-900 border-r border-slate-800 py-3 gap-1 z-20">
    <button class="relative w-9 h-9 rounded-xl bg-gradient-to-br from-violet-600 to-indigo-600 flex items-center justify-center mb-3 hover:scale-105 transition-transform shadow-lg" aria-label="Workspace">
      <span class="text-white font-bold text-sm">N</span>
      <span class="absolute -top-0.5 -right-0.5 w-3 h-3 rounded-full bg-green-400 border-2 border-slate-900"></span>
    </button>
    <div class="w-6 border-t border-slate-700 mb-1"></div>
    <a href="/" aria-label="Home" class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition"><i data-lucide="home" class="w-4 h-4"></i></a>
    <a href="/pages/threads.html" aria-label="Threads" class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition"><i data-lucide="message-square-text" class="w-4 h-4"></i></a>
    <a href="/pages/dm.html" aria-label="Direct Messages" class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition"><i data-lucide="message-circle" class="w-4 h-4"></i></a>
    <a href="/pages/calls.html" aria-label="Calls" class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition"><i data-lucide="phone" class="w-4 h-4"></i></a>
    <a href="/pages/files.html" aria-label="Files" class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition"><i data-lucide="folder" class="w-4 h-4"></i></a>
    <a href="/pages/ai-assistant.html" aria-label="AI" data-tooltip="AI Features" class="w-9 h-9 rounded-xl flex items-center justify-center bg-violet-600/20 text-violet-300 transition"><i data-lucide="sparkles" class="w-4 h-4"></i></a>
    <div class="flex-1"></div>
    <button onclick="window.NexusTheme?.toggleDark()" aria-label="Toggle theme" class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition"><i data-lucide="sun" class="w-4 h-4"></i></button>
    <a href="/pages/settings.html" aria-label="Settings" class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition"><i data-lucide="settings" class="w-4 h-4"></i></a>
    <a href="/pages/profile.html" class="relative mt-1" aria-label="Profile">
      <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=you" alt="Your avatar" class="w-9 h-9 rounded-xl bg-slate-700 hover:ring-2 hover:ring-violet-500 transition" />
      <span class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full bg-green-400 border-2 border-slate-900"></span>
    </a>
  </nav>

  <!-- AI Sidebar -->
  <aside data-app-sidebar class="flex flex-col w-56 shrink-0 bg-slate-900 border-r border-slate-800 overflow-y-auto hidden md:flex transition-all">
    <div class="px-4 py-4 border-b border-slate-800">
      <div class="flex items-center gap-2">
        <span class="w-7 h-7 rounded-lg bg-gradient-to-br from-violet-600 to-indigo-600 flex items-center justify-center"><i data-lucide="sparkles" class="w-4 h-4 text-white"></i></span>
        <h2 class="text-sm font-bold text-slate-100">AI Features</h2>
      </div>
      <p class="text-xs text-slate-500 mt-1.5">Smart tools for your workspace</p>
    </div>
    <div class="flex-1 py-3 space-y-0.5 px-2" data-ai-nav></div>
  </aside>

  <!-- Main -->
  <div data-app-main class="flex-1 flex flex-col overflow-hidden">
    <div class="flex items-center gap-3 px-6 py-4 border-b border-slate-800 bg-slate-900 shrink-0">
      <button aria-label="Open menu" class="md:hidden p-1.5 rounded-lg hover:bg-slate-800 text-slate-400" onclick="document.querySelector('[data-app-sidebar]').classList.toggle('hidden')"><i data-lucide="menu" class="w-5 h-5"></i></button>
      <div>
        <h1 class="text-base font-bold text-slate-100 flex items-center gap-2"><i data-lucide="wand-2" class="w-4 h-4 text-violet-400"></i> AI Rewrite</h1>
        <p class="text-xs text-slate-500">Rephrase your message in one click</p>
      </div>
    </div>

    <div data-ai-disabled class="hidden mx-6 mt-4 flex items-center gap-3 p-3 rounded-xl bg-amber-500/10 border border-amber-500/30 text-amber-300 text-sm">
      <i data-lucide="alert-triangle" class="w-4 h-4 shrink-0"></i>
      <span>AI Rewrite is turned off. Enable it in <a href="/pages/ai-settings.html" class="underline font-medium">AI Settings</a>.</span>
    </div>

    <div class="flex-1 overflow-y-auto p-6 max-w-4xl mx-auto w-full" data-ai-guarded>
      <div class="grid md:grid-cols-2 gap-5">
        <!-- Input -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Your text</p>
            <button onclick="loadSample()" class="text-xs text-violet-400 hover:text-violet-300 transition flex items-center gap-1"><i data-lucide="file-text" class="w-3.5 h-3.5"></i> Load sample</button>
          </div>
          <textarea id="rw-input" rows="8" placeholder="Type or paste a message to rewrite…" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-violet-500 transition resize-none leading-relaxed"></textarea>
          <p class="text-xs text-slate-500 mt-1.5"><span id="rw-count">0</span> characters</p>
        </div>
        <!-- Output -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Rewritten</p>
            <span id="rw-mode-label" class="text-xs text-slate-500"></span>
          </div>
          <div id="rw-output" class="w-full h-[calc(8rem+1.5rem+8px)] min-h-52 bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-200 leading-relaxed overflow-y-auto whitespace-pre-line">
            <span class="text-slate-600">Your rewritten text will appear here…</span>
          </div>
          <div class="flex gap-2 mt-2">
            <button onclick="copyOutput()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-medium transition"><i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy</button>
            <button onclick="useOutput()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-medium transition"><i data-lucide="corner-up-left" class="w-3.5 h-3.5"></i> Replace input</button>
          </div>
        </div>
      </div>

      <!-- Modes -->
      <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mt-6 mb-3">Choose a style</p>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <button class="rw-mode group flex flex-col items-start gap-2 p-4 rounded-xl bg-slate-900 border border-slate-800 hover:border-violet-500/50 transition text-left" data-mode="professional">
          <span class="w-9 h-9 rounded-lg bg-blue-500/15 text-blue-400 flex items-center justify-center"><i data-lucide="briefcase" class="w-4.5 h-4.5"></i></span>
          <span class="text-sm font-semibold text-slate-200">Professional</span>
          <span class="text-xs text-slate-500">Formal &amp; polished</span>
        </button>
        <button class="rw-mode group flex flex-col items-start gap-2 p-4 rounded-xl bg-slate-900 border border-slate-800 hover:border-violet-500/50 transition text-left" data-mode="friendly">
          <span class="w-9 h-9 rounded-lg bg-emerald-500/15 text-emerald-400 flex items-center justify-center"><i data-lucide="smile" class="w-4.5 h-4.5"></i></span>
          <span class="text-sm font-semibold text-slate-200">Friendly</span>
          <span class="text-xs text-slate-500">Warm &amp; approachable</span>
        </button>
        <button class="rw-mode group flex flex-col items-start gap-2 p-4 rounded-xl bg-slate-900 border border-slate-800 hover:border-violet-500/50 transition text-left" data-mode="shorter">
          <span class="w-9 h-9 rounded-lg bg-amber-500/15 text-amber-400 flex items-center justify-center"><i data-lucide="scissors" class="w-4.5 h-4.5"></i></span>
          <span class="text-sm font-semibold text-slate-200">Shorter</span>
          <span class="text-xs text-slate-500">Concise &amp; clear</span>
        </button>
        <button class="rw-mode group flex flex-col items-start gap-2 p-4 rounded-xl bg-slate-900 border border-slate-800 hover:border-violet-500/50 transition text-left" data-mode="grammar">
          <span class="w-9 h-9 rounded-lg bg-rose-500/15 text-rose-400 flex items-center justify-center"><i data-lucide="spell-check" class="w-4.5 h-4.5"></i></span>
          <span class="text-sm font-semibold text-slate-200">Fix Grammar</span>
          <span class="text-xs text-slate-500">Correct &amp; clean</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
<script>
window.addEventListener('load', () => { if (window.lucide) lucide.createIcons(); });
const SAMPLE = "hey so i just wanna say thanks for the help earlier, it was super usefull. can u send me teh report when your free? we definately need it before the meeting tmrw. thanks!!";
const MODE_LABELS = { professional:'Professional', friendly:'Friendly', shorter:'Shorter', grammar:'Grammar fixed' };
let lastOutput = '';

function loadSample() {
  document.getElementById('rw-input').value = SAMPLE;
  updateCount();
}
function updateCount() {
  document.getElementById('rw-count').textContent = document.getElementById('rw-input').value.length;
}

async function runRewrite(mode) {
  if (!window.NexusAI?.isEnabled('rewrite')) { window.NexusComponents?.toast('Enable AI Rewrite in AI Settings', 'warning'); return; }
  const text = document.getElementById('rw-input').value.trim();
  if (!text) { window.NexusComponents?.toast('Enter some text to rewrite', 'warning'); return; }
  const out = document.getElementById('rw-output');
  document.getElementById('rw-mode-label').textContent = MODE_LABELS[mode];
  out.innerHTML = '<span class="inline-flex items-center gap-2 text-slate-500"><i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Rewriting…</span>';
  if (window.lucide) lucide.createIcons();
  await window.NexusAI.think(600 + Math.random() * 500);
  lastOutput = window.NexusAI.rewrite(text, mode);
  await window.NexusAI.typeInto(out, lastOutput);
  window.NexusComponents?.toast(`Rewritten · ${MODE_LABELS[mode]}`, 'success', 1600);
}

function copyOutput() {
  if (!lastOutput) { window.NexusComponents?.toast('Nothing to copy yet', 'warning'); return; }
  navigator.clipboard?.writeText(lastOutput).then(() => window.NexusComponents?.toast('Copied to clipboard', 'success'));
}
function useOutput() {
  if (!lastOutput) return;
  document.getElementById('rw-input').value = lastOutput;
  updateCount();
  window.NexusComponents?.toast('Moved to input', 'info', 1500);
}

document.addEventListener('click', e => {
  const m = e.target.closest('.rw-mode');
  if (m) {
    document.querySelectorAll('.rw-mode').forEach(x => x.classList.remove('border-violet-500','bg-violet-600/5'));
    m.classList.add('border-violet-500','bg-violet-600/5');
    runRewrite(m.getAttribute('data-mode'));
  }
});
document.getElementById('rw-input')?.addEventListener('input', updateCount);
document.addEventListener('DOMContentLoaded', () => window.NexusAI?.guardFeature('rewrite'));
</script>
</body>
</html>
